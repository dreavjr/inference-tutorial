        .nb {
            margin: 40px 0;
            display: grid;
            gap: 20px;
        }

        .callout {
            background: #F4F1EA;
            border: 1px solid var(--rule);
            border-left: 3px solid var(--orange);
            border-radius: 10px;
            padding: 16px 22px;

        .nb-cell {

            border-radius: 10px;
            overflow: hidden;
            background: var(--card);
            box-shadow: 0 1px 2px rgba(60, 50, 30, .04);
        }

        .nb-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 7px 14px;
            border-bottom: 1px solid var(--rule);
            background: #F4F1EA;
            font: 600 10.5px/1 var(--sans);
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .nb-bar .gutter {
            font-variant-numeric: tabular-nums;
            color: #B6B0A2;
        }

        .nb-bar .tag {
            padding: 2px 9px;
            border-radius: 999px;
        }

        .nb-bar .tag.you {
            background: #E7EEF6;
            color: #355E92;
        }

        .nb-bar .tag.given {
            background: #ECE7DC;
            color: #7C7563;
        }

        .nb-run {
            margin-left: auto;
            font: 600 11px/1 var(--sans);
            border: 1px solid var(--rule);
            background: var(--card);
            color: var(--muted);
            border-radius: 999px;
            padding: 5px 13px;
            cursor: not-allowed;
        }

        textarea.nb-code {
            display: block;
            width: 100%;
            border: 0;
            padding: 14px 16px;
            font: 13px/1.62 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            color: #33312C;
            background: #FCFBF8;
            resize: vertical;
            tab-size: 4;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }

        .nb-cell.given textarea.nb-code {
            background: #F7F5F0;
            color: #545049;
        }

        .nb-out {
            border-top: 1px dashed var(--rule);
            padding: 13px 16px;
            min-height: 46px;
            display: flex;
            align-items: center;
            gap: 10px;
            font: italic 400 13px/1.5 var(--sans);
            color: var(--muted);
            background:
                repeating-linear-gradient(45deg, #FCFBF8 0 9px, #F6F4EF 9px 18px);
        }

        .nb-out .dot {
            font-style: normal;
            color: #B6B0A2;
        }

        .nb-q {
            border-left: 3px solid var(--blue);
            padding: 6px 0 6px 22px;
            margin: 1.4em 0 0;
        }

        .nb-q ul {
            margin: 0;
            padding-left: 20px;
        }

        .nb-q li {
            margin: 0 0 .7em;
        }

        .nb-q li:last-child {
            margin-bottom: 0;
        }

        .todo {
            color: #B23A2E;
            font-style: normal;
            font-weight: 600;
